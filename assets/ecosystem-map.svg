<svg width="1280" height="330" viewBox="0 0 1280 330" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Barry Clerjuste AI engineering ecosystem</title>
  <desc id="desc">Raven AI connects to Home for AI, Hermes Edge, OpenClinical AI, Raven BioComputer, and JSpace Chain through shared evidence and safety contracts.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#151518"/>
      <stop offset="1" stop-color="#09090A"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F04460"/>
      <stop offset="1" stop-color="#8A1528"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#E7D3AF"/>
      <stop offset="1" stop-color="#8B7656"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#FFFFFF" stroke-opacity="0.025"/>
    </pattern>
  </defs>
  <rect width="1280" height="330" rx="24" fill="url(#panel)"/>
  <rect width="1280" height="330" rx="24" fill="url(#grid)"/>
  <rect x="1" y="1" width="1278" height="328" rx="23" stroke="#FFFFFF" stroke-opacity="0.08"/>
  <text x="48" y="50" fill="#C8273F" font-family="ui-monospace, monospace" font-size="12" letter-spacing="3">THE RAVEN AI ECOSYSTEM</text>
  <text x="48" y="83" fill="#918C85" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="16">One research core. Multiple deployment surfaces. Shared evidence, routing, consent, and audit contracts.</text>
  <g stroke="url(#gold)" stroke-opacity="0.34" stroke-width="1.5">
    <path d="M640 171L338 171"/>
    <path d="M640 171L462 270"/>
    <path d="M640 171L818 270"/>
    <path d="M640 171L942 171"/>
    <path d="M640 171L640 94"/>
  </g>
  <g font-family="Avenir Next, Segoe UI, Arial, sans-serif">
    <rect x="542" y="126" width="196" height="90" rx="22" fill="#0A0A0B" stroke="#C8273F" stroke-opacity="0.68"/>
    <circle cx="582" cy="171" r="22" fill="url(#red)" fill-opacity="0.22" stroke="#C8273F"/>
    <text x="582" y="179" text-anchor="middle" fill="#F04460" font-family="Georgia, serif" font-size="25">R</text>
    <text x="618" y="160" fill="#F4EFE7" font-size="18" font-weight="600">Raven AI</text>
    <text x="618" y="183" fill="#817C75" font-size="12">evidence-linked research core</text>

    <rect x="204" y="128" width="224" height="86" rx="18" fill="#101012" stroke="#FFFFFF" stroke-opacity="0.1"/>
    <text x="228" y="162" fill="#F4EFE7" font-size="16" font-weight="600">Home for AI</text>
    <text x="228" y="184" fill="#817C75" font-size="12">desktop orchestration</text>

    <rect x="836" y="128" width="224" height="86" rx="18" fill="#101012" stroke="#FFFFFF" stroke-opacity="0.1"/>
    <text x="860" y="162" fill="#F4EFE7" font-size="16" font-weight="600">Hermes Edge</text>
    <text x="860" y="184" fill="#817C75" font-size="12">on-device routing</text>

    <rect x="350" y="238" width="224" height="66" rx="16" fill="#101012" stroke="#FFFFFF" stroke-opacity="0.1"/>
    <text x="374" y="268" fill="#F4EFE7" font-size="15" font-weight="600">Raven BioComputer</text>
    <text x="374" y="287" fill="#817C75" font-size="11">bounded biology compute</text>

    <rect x="706" y="238" width="224" height="66" rx="16" fill="#101012" stroke="#FFFFFF" stroke-opacity="0.1"/>
    <text x="730" y="268" fill="#F4EFE7" font-size="15" font-weight="600">OpenClinical AI</text>
    <text x="730" y="287" fill="#817C75" font-size="11">consent-aware runtime</text>

    <rect x="528" y="72" width="224" height="48" rx="14" fill="#101012" stroke="#C9AD7D" stroke-opacity="0.22"/>
    <text x="640" y="101" text-anchor="middle" fill="#C9AD7D" font-size="14" font-weight="600">JSpace Chain · research control plane</text>
  </g>
</svg>
